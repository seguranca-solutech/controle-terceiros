<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Terceiros | Solutech</title>

  <style>
    :root {
      --teal: #00a9a5;
      --teal-dark: #007f7b;
      --teal-soft: #e7fbfa;
      --green: #0fbf65;
      --yellow: #f2a900;
      --red: #e04444;
      --text: #263238;
      --muted: #68737a;
      --bg: #f4f7f8;
      --card: rgba(255, 255, 255, 0.94);
      --shadow: 0 18px 45px rgba(0, 70, 75, 0.16);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(0, 169, 165, .18), transparent 30%),
        radial-gradient(circle at 90% 25%, rgba(15, 191, 101, .13), transparent 34%),
        linear-gradient(135deg, #f8fbfc 0%, #eef5f5 100%);
      padding: 28px;
    }

    .page {
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #ffffff 0%, #edfdfb 100%);
      border: 1px solid rgba(0, 169, 165, .18);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 26px 30px;
      margin-bottom: 22px;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -80px;
      top: -90px;
      width: 260px;
      height: 260px;
      background: rgba(0, 169, 165, .13);
      border-radius: 50%;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 28px;
      align-items: center;
    }

    .title-wrap small {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      color: var(--teal-dark);
      border: 1px solid rgba(0, 169, 165, .25);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .4px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .title-wrap small::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(15, 191, 101, .12);
    }

    h1 {
      font-size: clamp(34px, 5vw, 58px);
      line-height: .95;
      letter-spacing: -2px;
      color: #123537;
    }

    .logo {
      width: 230px;
      max-width: 30vw;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, .12));
    }

    .toolbar {
      position: relative;
      z-index: 9999;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      margin-bottom: 22px;
      align-items: center;
    }

    .search-card {
      position: relative;
      z-index: 9999;
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 169, 165, .20);
      border-radius: 22px;
      box-shadow: 0 10px 28px rgba(0, 70, 75, .10);
      padding: 10px;
      display: grid;
      grid-template-columns: 46px 1fr;
      align-items: center;
    }

    .search-icon {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--teal-soft);
      color: var(--teal-dark);
      font-size: 20px;
      font-weight: 900;
    }

    .search-input {
      height: 42px;
      border: none;
      outline: none;
      background: transparent;
      padding: 0 10px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .search-input::placeholder {
      color: #90a0a5;
      font-weight: 600;
    }

    .suggestions {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      background: white;
      border: 1px solid rgba(0, 169, 165, .18);
      border-radius: 18px;
      box-shadow: 0 22px 60px rgba(0, 70, 75, .25);
      overflow: hidden;
      z-index: 99999;
      max-height: 310px;
      overflow-y: auto;
    }

    .suggestion-item {
      padding: 13px 18px;
      cursor: pointer;
      border-bottom: 1px solid #f1f4f4;
      font-weight: 800;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      background: #fff;
    }

    .suggestion-item span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .suggestion-item:hover {
      background: #f3fbfb;
    }

    .refresh-btn {
      border: none;
      min-height: 62px;
      padding: 0 22px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--teal), var(--teal-dark));
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .3px;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(0, 169, 165, .28);
      transition: .2s ease;
      white-space: nowrap;
    }

    .refresh-btn:hover {
      transform: translateY(-1px);
      filter: brightness(.98);
    }

    #app {
      position: relative;
      z-index: 1;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 22px;
      margin-bottom: 22px;
    }

    .profile-card,
    .status-card,
    .doc-card,
    .loading {
      background: var(--card);
      border: 1px solid rgba(0, 169, 165, .18);
      border-radius: var(--radius);
      box-shadow: 0 14px 34px rgba(0, 70, 75, .11);
    }

    .profile-card {
      padding: 28px;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .profile-card::before {
      content: "";
      position: absolute;
      width: 8px;
      top: 28px;
      bottom: 28px;
      left: 0;
      background: linear-gradient(var(--teal), var(--green));
      border-radius: 0 10px 10px 0;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--muted);
      font-weight: 900;
      margin-bottom: 8px;
    }

    .person-name {
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1;
      letter-spacing: -1.8px;
      font-weight: 950;
      color: #0f2f31;
      margin-bottom: 18px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      background: #f3f8f8;
      color: #365255;
      border: 1px solid #e1eeee;
      font-size: 13px;
      font-weight: 850;
    }

    .status-card {
      padding: 26px;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .status-card::after {
      content: "";
      position: absolute;
      right: -34px;
      bottom: -44px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,.20);
    }

    .status-card .label {
      color: rgba(255,255,255,.84);
    }

    .status-value {
      color: #fff;
      font-size: 42px;
      font-weight: 950;
      letter-spacing: -1px;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    .status-liberado {
      background: linear-gradient(135deg, #0dbf64, #069c51);
      border: none;
    }

    .status-pendente {
      background: linear-gradient(135deg, #ffbd2e, #e19400);
      border: none;
    }

    .status-bloqueado,
    .status-vencido {
      background: linear-gradient(135deg, #e95050, #bf2525);
      border: none;
    }

    .docs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .doc-card {
      padding: 20px;
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: .2s ease;
      border-left: 5px solid var(--teal);
    }

    .doc-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(0, 70, 75, .14);
    }

    .doc-title {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      font-size: 12px;
      font-weight: 950;
    }

    .doc-value {
      font-size: 24px;
      font-weight: 950;
      color: #123537;
      margin: 8px 0 10px;
      word-break: break-word;
    }

    .doc-badge {
      align-self: flex-start;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .3px;
      background: var(--teal-soft);
      color: var(--teal-dark);
    }

    .doc-ok .doc-badge {
      background: rgba(15, 191, 101, .12);
      color: #087f43;
    }

    .doc-vencendo {
      border-left-color: var(--yellow);
    }

    .doc-vencendo .doc-badge {
      background: rgba(242, 169, 0, .13);
      color: #a96c00;
    }

    .doc-vencido {
      border-left-color: var(--red);
    }

    .doc-vencido .doc-badge {
      background: rgba(224, 68, 68, .12);
      color: #b92b2b;
    }

    .doc-pendente {
      border-left-color: var(--yellow);
    }

    .doc-pendente .doc-badge {
      background: rgba(242, 169, 0, .13);
      color: #a96c00;
    }

    .loading {
      padding: 32px;
      text-align: center;
      font-weight: 900;
      color: var(--muted);
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: #78878c;
      font-weight: 650;
    }

    @media (max-width: 950px) {
      body {
        padding: 16px;
      }

      .hero-inner,
      .toolbar,
      .main-grid {
        grid-template-columns: 1fr;
      }

      .logo {
        width: 190px;
        max-width: 70vw;
      }

      .refresh-btn {
        width: 100%;
      }

      .docs-grid {
        grid-template-columns: 1fr;
      }

      .status-value {
        font-size: 34px;
      }
    }
  </style>
</head>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyLu3Gx8fqI5aQzp-TGhcBgWO9s9N0KwTQwG5L7seTkjjkbw2gDhA2JI9CvtpjNwDus/exec";
    let base = [];
    let atual = null;

    function normalizar(valor) {
      return String(valor || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    function parseData(valor) {
      if (!valor || valor === "--") return null;
      const texto = String(valor).trim();

      if (/^\d{2}\/\d{2}\/\d{4}$/.test(texto)) {
        const [dia, mes, ano] = texto.split("/").map(Number);
        return new Date(ano, mes - 1, dia);
      }

      const data = new Date(texto);
      if (isNaN(data.getTime())) return null;
      return new Date(data.getFullYear(), data.getMonth(), data.getDate());
    }

    function formatarData(valor) {
      if (!valor || valor === "--") return "--";
      const texto = String(valor).trim();

      if (/^\d{2}\/\d{2}\/\d{4}$/.test(texto)) return texto;

      const data = new Date(texto);
      if (isNaN(data.getTime())) return texto;

      return data.toLocaleDateString("pt-BR", { timeZone: "America/Sao_Paulo" });
    }

    function diasAteVencer(valor) {
      const data = parseData(valor);
      if (!data) return null;

      const hoje = new Date();
      const hojeLimpo = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());

      return Math.ceil((data - hojeLimpo) / (1000 * 60 * 60 * 24));
    }

    function statusDoDocumento(valor, ehData = true) {
      const texto = normalizar(valor);

      if (!valor || texto === "--" || texto === "na" || texto.includes("nao aplicavel")) {
        return { classe: "doc-ok", badge: "Não aplicável" };
      }

      if (!ehData) {
        if (texto.includes("pendente")) return { classe: "doc-pendente", badge: "Pendente" };
        if (texto.includes("vencido") || texto.includes("bloqueado")) return { classe: "doc-vencido", badge: "Atenção" };
        if (texto.includes("ok")) return { classe: "doc-ok", badge: "OK" };
        return { classe: "doc-ok", badge: "Informado" };
      }

      const dias = diasAteVencer(valor);

      if (dias === null) {
        if (texto.includes("pendente")) return { classe: "doc-pendente", badge: "Pendente" };
        return { classe: "doc-ok", badge: "Informado" };
      }

      if (dias < 0) return { classe: "doc-vencido", badge: `Vencido há ${Math.abs(dias)} dia(s)` };
      if (dias <= 30) return { classe: "doc-vencendo", badge: `Vence em ${dias} dia(s)` };

      return { classe: "doc-ok", badge: "Dentro do prazo" };
    }

    function classeStatus(status) {
      const s = normalizar(status);

      if (s.includes("liberado")) return "status-liberado";
      if (s.includes("pendente")) return "status-pendente";
      if (s.includes("bloqueado")) return "status-bloqueado";
      if (s.includes("vencido")) return "status-vencido";

      return "status-pendente";
    }

    function montarCard(titulo, valor, ehData = true) {
      const info = statusDoDocumento(valor, ehData);
      const valorFinal = ehData ? formatarData(valor) : (valor || "--");

      return `
        <article class="doc-card ${info.classe}">
          <div>
            <div class="doc-title">${titulo}</div>
            <div class="doc-value">${valorFinal}</div>
          </div>
          <div class="doc-badge">${info.badge}</div>
        </article>
      `;
    }

    function render(item) {
      atual = item;

      const app = document.getElementById("app");

      if (!item) {
        app.innerHTML = `<div class="loading">Nenhum colaborador encontrado.</div>`;
        return;
      }

      app.innerHTML = `
        <section class="main-grid">
          <article class="profile-card">
            <div class="label">Nome</div>
            <div class="person-name">${item.NOME || "--"}</div>

            <div class="meta-row">
              <span class="pill">${item.FUNCAO || "Função não informada"}</span>
              <span class="pill">${item.EMPRESA || "Empresa não informada"}</span>
            </div>
          </article>

          <article class="status-card ${classeStatus(item.STATUS)}">
            <div class="label">Status</div>
            <div class="status-value">${item.STATUS || "--"}</div>
          </article>
        </section>

        <section class="docs-grid">
          ${montarCard("Integração", item.VALIDADE_INTEGRACAO, true)}
          ${montarCard("ASO", item.VALIDADE_ASO, true)}
          ${montarCard("PCMSO", item.VALIDADE_PCMSO, true)}
          ${montarCard("PGR", item.VALIDADE_PGR, true)}
          ${montarCard("Ficha de EPI", item.FICHA_EPI, true)}
          ${montarCard("NR-10", item.NR10, true)}
          ${montarCard("NR-33", item.NR33, true)}
          ${montarCard("NR-35", item.NR35, true)}
          ${montarCard("RG/CPF", item.RG_CPF, false)}
          ${montarCard("Ficha de Registro", item.FICHA_REGISTRO, false)}
          ${montarCard("CTPS", item.CTPS, false)}
          ${montarCard("Observação", item.OBSERVACAO || "--", false)}
        </section>
      `;
    }

    function listarSugestoes(lista) {
      const box = document.getElementById("suggestions");

      if (!lista.length) {
        box.style.display = "none";
        box.innerHTML = "";
        return;
      }

      box.innerHTML = lista.map((item, index) => `
        <div class="suggestion-item" data-index="${index}">
          <strong>${item.NOME || "--"}</strong>
          <span>${item.EMPRESA || ""}</span>
        </div>
      `).join("");

      box.style.display = "block";

      [...box.querySelectorAll(".suggestion-item")].forEach((element, index) => {
        element.onclick = () => {
          render(lista[index]);
          document.getElementById("searchInput").value = lista[index].NOME || "";
          box.style.display = "none";
        };
      });
    }

    function pesquisar() {
      const termo = normalizar(document.getElementById("searchInput").value);

      if (!termo) {
        listarSugestoes(base.slice(0, 10));
        return;
      }

      const lista = base.filter(item =>
        normalizar(item.NOME).includes(termo) ||
        normalizar(item.EMPRESA).includes(termo) ||
        normalizar(item.FUNCAO).includes(termo)
      );

      listarSugestoes(lista.slice(0, 12));

      if (lista.length === 1) render(lista[0]);
    }

    async function carregarDados() {
      const app = document.getElementById("app");
      app.innerHTML = `<div class="loading">Carregando dados...</div>`;

      try {
        const resposta = await fetch(API_URL + "?cache=" + Date.now(), { cache: "no-store" });
        const dados = await resposta.json();

        if (!Array.isArray(dados)) throw new Error("A API não retornou uma lista.");

        base = dados
          .filter(item => String(item.NOME || "").trim() !== "")
          .sort((a, b) => String(a.NOME || "").localeCompare(String(b.NOME || ""), "pt-BR"));

        const buscaAtual = normalizar(document.getElementById("searchInput").value);

        if (buscaAtual) {
          const encontrado = base.find(item => normalizar(item.NOME).includes(buscaAtual));
          render(encontrado || base[0] || null);
        } else {
          render(base[0] || null);
        }

      } catch (erro) {
        console.error(erro);
        app.innerHTML = `<div class="loading">Erro ao carregar dados. Verifique o Apps Script e a planilha.</div>`;
      }
    }

    document.getElementById("refreshBtn").onclick = carregarDados;
    document.getElementById("searchInput").oninput = pesquisar;
    document.getElementById("searchInput").onfocus = () => listarSugestoes(base.slice(0, 10));

    document.getElementById("searchInput").onkeydown = (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        const termo = normalizar(event.target.value);
        const encontrado = base.find(item =>
          normalizar(item.NOME).includes(termo) ||
          normalizar(item.EMPRESA).includes(termo) ||
          normalizar(item.FUNCAO).includes(termo)
        );

        if (encontrado) {
          render(encontrado);
          event.target.value = encontrado.NOME || "";
          document.getElementById("suggestions").style.display = "none";
        }
      }
    };

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".search-card")) {
        document.getElementById("suggestions").style.display = "none";
      }
    });

    carregarDados();
  </script>
</body>
</html>
